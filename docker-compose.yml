services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imkqas-app
    # 使用宿主机网络模式（最简单，直接访问宿主机服务）
    network_mode: "host"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # 使用 localhost 因为 network_mode: host
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:-imkqas}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fqr10292588}
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: 6379
      IMKQAS_MINIO_ENDPOINT: http://localhost:9000
      IMKQAS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-IVL8IthgH8OjCEDLhFKT}
      IMKQAS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-MaJEjDYQYSKfWVadxSPM2knEIKkVrXLgWvvxB8M8}
      IMKQAS_MILVUS_HOST: localhost
      IMKQAS_MILVUS_PORT: 19530
      IMKQAS_SECURITY_JWT_SECRET: ${IMKQAS_SECURITY_JWT_SECRET:-imkqas-medical-rag-secret-key-2026}
      IMKQAS_SECURITY_JWT_EXPIRATION: ${IMKQAS_SECURITY_JWT_EXPIRATION:-86400000}
      RAG_EMBEDDING_API_KEY: ${RAG_EMBEDDING_API_KEY:-}
      RAG_RERANKER_API_KEY: ${RAG_RERANKER_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    # 移除 depends_on（不需要等待其他容器）

volumes:
  app_logs: