version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: imkqas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: fqr10292588
      MYSQL_DATABASE: imkqas
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - imkqas-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: imkqas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 30
    networks:
      - imkqas-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: imkqas-minio
    environment:
      MINIO_ROOT_USER: IVL8IthgH8OjCEDLhFKT
      MINIO_ROOT_PASSWORD: MaJEjDYQYSKfWVadxSPM2knEIKkVrXLgWvvxB8M8
      MINIO_DEFAULT_BUCKETS: medical-documents
    ports:
      - "9000:9000"  # API端口
      - "9001:9001"  # 控制台端口
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - imkqas-network

  # Milvus向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.6
    container_name: imkqas-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # Milvus服务端口
      - "9091:9091"    # 指标端口
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - imkqas-network

  # etcd（Milvus依赖）
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: imkqas-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - imkqas-network

  # Spring Boot应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imkqas-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/imkqas?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: fqr10292588
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      IMKQAS_MINIO_ENDPOINT: http://minio:9000
      IMKQAS_MINIO_ACCESS_KEY: IVL8IthgH8OjCEDLhFKT
      IMKQAS_MINIO_SECRET_KEY: MaJEjDYQYSKfWVadxSPM2knEIKkVrXLgWvvxB8M8
      IMKQAS_MILVUS_HOST: milvus
      IMKQAS_MILVUS_PORT: 19530
      IMKQAS_SECURITY_JWT_SECRET: imkqas-medical-rag-secret-key-2026
      IMKQAS_SECURITY_JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - imkqas-network

volumes:
  mysql_data:
  redis_data:
  minio_data:
  milvus_data:
  etcd_data:
  app_logs:

networks:
  imkqas-network:
    driver: bridge