# IMKQAS 医疗知识问答系统配置文件
# 版本: 1.0
# 日期: 2026-04-06

debug: true

spring:
  application:
    name: imkqas

  # 数据源配置
  datasource:
    url: jdbc:mysql://8.138.40.200:3306/imkqas?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: fqr10292588
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      connection-test-query: SELECT 1
      validation-timeout: 3000
      max-lifetime: 600000
      idle-timeout: 300000


  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # 缓存配置
  cache:
     type: redis
     redis:
       time-to-live: 3600000  # 1小时
       cache-null-values: false


  # Redis配置
  data:
    redis:
      host: 8.138.40.200
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Flyway数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true  # 如果数据库非空，创建基线版本
    baseline-version: "1"      # 基线版本号
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true       # 生产环境禁用clean命令

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# 日志配置
logging:
  level:
    com.student: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/imkqas.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用自定义配置
# Modified for login fix
imkqas:
  # RAG配置
  rag:
    # 重排序模型配置
    reranker:
      model: gte-rerank-v2
      # 部署方式: local(本地ONNX), api(远程API)
      deployment: api
      # 远程API配置（阿里云DashScope）
      api-endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
      api-key: sk-ca1040e1914248cbb02dcb7ca8c7120a
      # 重排序top-k
      top-k: 10
      # 缓存配置
      cache-enabled: true
      cache-ttl: 1800  # 30分钟
      # 超时配置 (毫秒)
      timeout: 3000

    # 嵌入模型配置
    embedding:
      # 模型名称
      model: text-embedding-v3
      # 输出维度
      dimension: 1024
      # API端点 (阿里云百炼)
      api-endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
      # API密钥 (从环境变量读取)
      api-key: sk-ca1040e1914248cbb02dcb7ca8c7120a
      # 是否启用缓存
      cache-enabled: true
      # 超时时间 (毫秒)
      timeout: 10000
      # 缓存TTL (秒)
      cache-ttl: 1800
      # 部署方式: api(远程API), local(本地模型)
      deployment: api

    # 检索配置
    retrieval:
      # 检索模式: vector(向量), keyword(关键词), hybrid(混合)
      mode: hybrid
      # 各检索方式权重
      weights:
        vector: 0.6
        keyword: 0.4
      # 双路召回各取 K=30，RRF融合后输出候选集
      initial-top-k: 30
      # 精排输出 top5 送入 LLM 生成
      rerank-top-k: 5
      # RRF融合参数
      rrf-k: 60
      # 超时配置 (毫秒)
      timeout: 10000

      # 关键词索引配置
      keyword-index:
        path: lucene-index
        synonyms:
          enabled: true

    # 大语言模型配置 (阿里云百炼 DashScope，兼容 OpenAI 接口格式)
    llm:
      base-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
      api-key: sk-ca1040e1914248cbb02dcb7ca8c7120a
      model: qwen-plus                      # 可选: qwen-turbo / qwen-plus / qwen-max
      embedding-model: text-embedding-v3   # 输出维度 1024，与 Milvus 一致
      timeout: 60                           # 超时时间 (秒)

    # 文档处理配置
    document:
      # 支持的文件类型
      supported-formats: pdf
      # MinerU PDF 转换配置（云端 API，服务端零部署）
      mineru:
        enabled: true
        api-endpoint: https://mineru.net/api/v1/agent/parse/file
        api-key: ""
        timeout: 300
      # Tesseract OCR 降级配置（扫描件PDF提取质量不足时自动触发）
      ocr:
        enabled: true
        language: "chi_sim+eng"
        min-text-length: 50
        render-dpi: 300
      # PDF 预检查配置（MinerU 前的快速分类，让数字原生 PDF 跳过 MinerU）
      pdf-pre-check:
        enabled: true
        digital-native-min-text-length: 500
        scanned-max-text-length: 200
        min-pages-with-text: 2
        toc-pattern-repeat-threshold: 5

      # 页面级处理决策配置
      page-level:
        enabled: true
        min-text-layer-length: 10
        skip-non-key-pages: true
        medical-keywords: ""

      # 文本后处理配置
      text-cleaner:
        enabled: true
        remove-headers-footers: true
        header-footer-repeat-threshold: 3
        remove-citations: true
        normalize-whitespace: true
        fix-broken-lines: true
        remove-metadata: true

      # 分块配置
      chunk:
        size: 500
        overlap: 50
        # 分块策略: fixed(固定大小), recursive(递归语义分割), semantic(同 recursive), medical(医学文档结构感知)
        strategy: semantic
        min-chunk-size: 20
        # 分隔符优先级列表（逗号分隔）
        separators: "\n\n,\n,。,；,，, ,"
        # 医学文档分块专用配置（仅 strategy=medical 时生效）
        medical:
          section-hierarchy: true
          table-protection: true
          icd-detection: true
          sibling-context: true
          min-section-header-length: 2
          min-table-rows: 2
          sibling-merge-threshold: 150
          max-depth: 5
      # 文本提取配置
      extraction:
        pdf:
          strategy: pdfbox
          extract-images: false
        docx:
          strategy: poi

    # 缓存配置
    cache:
      # 查询结果缓存
      query:
        enabled: true
        ttl: 3600  # 1小时
        max-size: 1000
      # 嵌入向量缓存
      embedding:
        enabled: true
        ttl: 86400  # 24小时
        max-size: 10000
      # LLM响应缓存
      llm:
        enabled: true
        ttl: 1800  # 30分钟
        max-size: 500

    # SNOMED CT 配置
    snomed:
      # 是否启用SNOMED CT服务
      enabled: true
      # Snowstorm服务基础URL
      base-url: http://localhost:8082
      # FHIR API路径
      fhir-path: /fhir
      # 连接超时时间（毫秒）
      connect-timeout: 5000
      # 读取超时时间（毫秒）
      read-timeout: 10000
      # 最大重试次数
      max-retries: 3
      # 缓存过期时间（小时）
      cache-expiration-hours: 24
      # 是否启用本地降级映射
      fallback-enabled: true
      # 批量查询最大数量
      batch-max-size: 100

    # 查询预处理配置
    query-rewrite:
      # THUOCL医学词库路径
      thuocl-dict-path: /data/dict/thuocl_medical.txt
      # 同义词文件
      synonyms-file: classpath:synonyms.txt
      # 停用词文件
      stopwords-file: classpath:stopwords.txt
      # 拼写纠正开关
      enable-spell-checker: true

      # 同义词扩展配置
      synonym-expansion:
        # 未映射率告警阈值（百分比，超过此值触发告警）
        unmapped-alert-threshold: 5.0
        # LLM推断最低置信度阈值（低于此值不采纳）
        llm-min-confidence: 0.85
        # 是否启用LLM兜底推断
        llm-fallback-enabled: true

    # 性能监控配置
    monitoring:
      enabled: true
      # 指标采集间隔 (秒)
      interval: 60
      # 慢查询阈值 (毫秒)
      slow-query-threshold: 5000
      # 错误率阈值 (%)
      error-rate-threshold: 5.0

    # ─── 质量过滤配置 ───
    quality-filter:
      # 最小片段长度（字符数，低于此值丢弃）
      min-fragment-length: 20
      # 黑名单域名（低质量来源）
      blacklist-domains:
        - zhidao.baidu.com
        - baike.baidu.com
        - zhihu.com
        - tieba.baidu.com
        - haodf.com
        - xywy.com
      # 黑名单来源的内容长度阈值（低于此值才丢弃）
      blacklist-min-length: 100
      # 是否启用矛盾检测
      contradiction-detection-enabled: true
      # 矛盾检测权威性阈值
      contradiction-authority-threshold: 0.7

    # ─── 语义缓存链配置 ───
    semantic-cache:
      # 是否启用语义缓存
      enabled: true
      # Redis缓存TTL（秒），作为最终兜底（超过则缓存自动失效，懒加载重建）
      ttl: 7200
      # 分布式锁等待超时（秒）
      lock-wait-timeout: 5
      # 分布式锁TTL（秒），防止死锁
      lock-ttl: 30
      # 术语映射版本定时检查间隔（秒）
      version-check-interval: 3600
      # 知识库当前版本（可通过 /api/admin/cache/version/increment 递增）
      knowledge-version: 1

    # ─── 多因子重排序配置 ───
    multi-factor-rerank:
      # 三维度权重（和为1）
      weights:
        # 权威性权重（证据金字塔等级）
        authority: 0.4
        # 时效性权重（指数衰减）
        timeliness: 0.2
        # 语义相似度权重（交叉编码器）
        semantic: 0.4
      # 时效性衰减率 λ
      decay-rate: 0.3
      # 各知识类型半衰期（年）
      half-lives:
        treatment: 3.0
        diagnosis: 6.0
        device: 5.0
        basic-science: 18.0
        public-health: 4.0
        classic-research: 100.0
        unknown: 5.0

    # 安全兜底配置
    safety:
      # 总开关
      enabled: true

      # ─── ① 急症预检 ───
      emergency:
        enabled: true
        # 关键词分级库
        keywords:
          CRITICAL:
            - "胸痛剧烈"
            - "呼吸困难"
            - "大出血"
            - "昏迷不醒"
            - "心跳停止"
            - "窒息"
            - "严重过敏反应"
            - "药物中毒"
            - "农药中毒"
            - "意识丧失"
            - "抽搐不止"
            - "剧烈头痛伴呕吐"
          HIGH:
            - "高烧不退"
            - "持续呕吐"
            - "严重外伤"
            - "开放性骨折"
            - "大面积烧伤"
            - "吐血"
            - "便血"
            - "剧烈腹痛"
            - "抽搐"
            - "言语不清"
            - "半身麻木"
            - "口眼歪斜"
          MEDIUM:
            - "持续腹泻"
            - "严重皮疹"
            - "持续头晕"
            - "视力模糊"
            - "持续发热"
        # 各级别回复模板
        response-templates:
          CRITICAL: "⚠️ 您描述的症状可能属于医疗急症，请立即停止线上咨询，拨打120急救电话或前往最近医院的急诊科就诊！这是紧急情况，请务必尽快就医！"
          HIGH: "⚠️ 您描述的症状较为严重，建议尽快就医。请立即前往医院急诊科或相关专科就诊，不要延误。"
          MEDIUM: "⚠️ 您描述的症状需要引起注意，建议尽快就医。如症状持续或加重，请及时到医疗机构就诊。"

      # ─── ② 置信度门控 ───
      confidence:
        enabled: true
        # 硬阻断阈值：低于此值不调用 LLM
        min-threshold: 0.35
        # 警告阈值：低于此值 LLM 正常生成但添加免责声明
        warning-threshold: 0.6
        # 检索结果为空时的响应
        no-retrieval-response: "抱歉，我无法从现有医学资料库中找到与您问题相关的信息。医疗建议需要基于确切的医学知识，建议您咨询专业医生获取准确的诊断和治疗方案。"
        # 低于 min-threshold 时的响应
        low-confidence-response: "抱歉，当前检索到的医学资料与您问题的相关性较低，无法生成可靠的回答。为了您的健康安全，建议您咨询专业医生获取准确信息。"

      # ─── ③ 回答安全校验 ───
      answer-safety:
        enabled: true
        # LLM 回答中禁止出现的模式（正则表达式）
        blocked-patterns:
          - "建议(服用|使用|口服|注射).*药物"
          - "推荐.*(剂量|用量|用法)"
          - "请服用"
          - "处方药.*[剂量用量]"
        # 命中时的替换文本
        replacement-text: "[请遵医嘱用药]"
        # 免责声明模板
        disclaimer: "\n\n---\n*免责声明：以上信息仅供参考，不能替代专业医疗建议。如有身体不适，请及时前往医疗机构就诊。*"
        # 免责声明的置信度上限
        disclaimer-max-confidence: 0.8

  # 安全配置
  security:
    jwt:
      secret: imkqas-medical-rag-secret-key-2026
      expiration: 86400000  # 24小时

    # 限流配置
    rate-limit:
      user:
        default: 10  # 10请求/秒
        burst: 20    # 突发容量
      admin:
        default: 50  # 50请求/秒
        burst: 100   # 突发容量
      upload: 2      # 文档上传接口限制

  # 文件存储配置
  storage:
    type: minio
    minio:
      endpoint: http://8.138.40.200:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: imkqas

  # 向量数据库配置
  vector-db:
    type: milvus
    milvus:
      host: 8.138.40.200
      port: 19530
      collection: medical_documents
      dimension: 1024

  # 科室导诊服务配置
  triage:
    # 知识库配置路径
    knowledge-base-path: config/department-knowledge.yml
    synonyms-path: config/symptom-synonyms.yml

    # 缓存配置
    enable-cache: true
    cache-ttl: 3600  # 1小时

    # 引擎配置
    rule-engine-threshold: 0.8  # 规则引擎匹配阈值，80%症状通过规则引擎处理
    llm-fallback-timeout: 3000  # LLM降级分析超时时间（毫秒）

    # 性能配置
    max-batch-size: 20  # 批量处理最大数量
    emergency-check-enabled: true  # 是否启用急诊检查

    # 统计配置
    enable-stats: true  # 是否启用统计
    stats-log-interval: 300  # 统计日志输出间隔（秒）

    # 引擎配置
    engine:
      # 顺序执行配置
      rule-engine-threshold: 0.6  # 规则引擎置信度阈值，低于此值触发LLM
      llm-timeout: 3000           # LLM调用超时时间（毫秒）

      # 结果融合权重配置
      rule-engine-weight: 0.8
      llm-weight: 0.2

      # 规则引擎配置
      enable-fuzzy-match: true
      fuzzy-match-threshold: 0.7
      min-match-score: 0.3
      max-recommendations: 3

      # LLM适配器配置
      llm-triage-prompt-template: |
        你是一个医疗分诊专家。请根据以下症状描述，推荐最合适的就诊科室。
        症状：{symptoms}

        请按以下格式回复：
        1. 主要推荐科室：[科室名称]
        2. 置信度：[0.0-1.0之间的浮点数]
        3. 理由：[简要说明推荐理由]
        4. 备选科室：[科室1, 科室2...]（可选）
        5. 紧急程度：[CRITICAL/HIGH/MEDIUM/LOW]（可选）
      enable-llm-cache: true
      llm-cache-ttl: 3600

      # 急诊检测配置
      enable-emergency-detection: true
      emergency-detection-timeout: 1000
      emergency-thresholds:
        CRITICAL: 3
        HIGH: 2
        MEDIUM: 1
        LOW: 0

      # 统计监控配置
      stats-retention-days: 30
      stats-sampling-rate: 1.0

      # 性能配置
      thread-pool-core-size: 2
      thread-pool-max-size: 4
      thread-pool-queue-capacity: 100
      thread-pool-keep-alive-seconds: 60
      batch-processing-max-size: 20
      batch-processing-timeout: 10000

      # 降级配置
      enable-auto-fallback: true
      llm-unavailable-fallback: "RULE_ENGINE"
      rule-engine-unavailable-fallback: "FALLBACK"
      fallback-advice: "建议咨询医院导诊台或全科医学科"

  # ─── 评估系统配置 ───
  evaluation:
    # 总开关
    enabled: true

    # 离线评估配置
    offline:
      max-concurrency: 4
      default-k-values: [1, 5, 10, 20, 30]
      llm-judge:
        enabled: true
        model: qwen-plus
        max-retries: 3
        timeout: 30
        cache-enabled: true

    # 在线监控配置
    online:
      enabled: true
      collection-interval: 60
      retention-days: 30
      percentile-enabled: true
      percentile-window-size: 100
      unmapped-term-alert-threshold: 5.0
      slow-query-threshold-ms: 5000
      error-rate-alert-threshold: 5.0

    # 报告配置
    report:
      output-dir: ./evaluation-reports
      default-format: BOTH
      retention-days: 90
      auto-baseline: true

  # HIS/FHIR集成配置（预留）
  his:
    # 是否启用HIS集成（预留阶段关闭）
    enabled: false
    # HIS FHIR服务器基础URL
    base-url: http://localhost:8083
    # FHIR API路径
    fhir-path: /fhir
    # HIS系统名称
    system-name: HIS
    # 连接超时（毫秒）
    connect-timeout: 5000
    # 读取超时（毫秒）
    read-timeout: 15000
    # 最大重试次数
    max-retries: 2
    # 缓存过期时间（小时）
    cache-expiration-hours: 24
    # 默认分页大小
    default-page-size: 20
    # 最大分页大小
    max-page-size: 100
    # 问卷会话超时（分钟）
    interview-session-timeout-minutes: 30