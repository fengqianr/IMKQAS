# IMKQAS 医疗知识问答系统配置文件
# 版本: 1.0
# 日期: 2026-04-06

debug: true

spring:
  application:
    name: imkqas

  # 数据源配置
  datasource:
    url: jdbc:mysql://8.138.40.200:3306/imkqas?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: fqr10292588
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5


  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # 缓存配置
  cache:
     type: redis
     redis:
       time-to-live: 3600000  # 1小时
       cache-null-values: false


  # Redis配置
  data:
    redis:
      host: 8.138.40.200
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Flyway数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true  # 如果数据库非空，创建基线版本
    baseline-version: "1"      # 基线版本号
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true       # 生产环境禁用clean命令

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# 日志配置
logging:
  level:
    com.student: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/imkqas.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用自定义配置
imkqas:
  # RAG配置
  rag:
    # 重排序模型配置
    reranker:
      model: gte-rerank
      # 部署方式: local(本地ONNX), api(远程API)
      deployment: api
      # 远程API配置（阿里云DashScope）
      api-endpoint: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
      api-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
      api-key: ${BAILIAN_API_KEY}
      # 重排序top-k
      top-k: 5
      # 缓存配置
      cache-enabled: true
      cache-ttl: 1800  # 30分钟
      # 超时配置 (毫秒)
      timeout: 3000

    # 嵌入模型配置
    embedding:
      # 模型名称
      model: text-embedding-v3
      # 输出维度
      dimension: 1024
      # API端点 (阿里云百炼)
      api-endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
      # API密钥 (从环境变量读取)
      api-key: sk-706cf44145e64d96b9f53fcb4db86f9f
      # 是否启用缓存
      cache-enabled: true
      # 超时时间 (毫秒)
      timeout: 10000
      # 缓存TTL (秒)
      cache-ttl: 1800
      # 部署方式: api(远程API), local(本地模型)
      deployment: api

    # 检索配置
    retrieval:
      # 检索模式: vector(向量), keyword(关键词), hybrid(混合)
      mode: hybrid
      # 各检索方式权重
      weights:
        vector: 0.6
        keyword: 0.4
      # top-k配置
      initial-top-k: 20
      rerank-top-k: 5
      # RRF融合参数
      rrf-k: 60
      # 超时配置 (毫秒)
      timeout: 10000

      # 关键词索引配置
      keyword-index:
        path: lucene-index
        synonyms:
          enabled: true

    # 大语言模型配置 (阿里云百炼 DashScope，兼容 OpenAI 接口格式)
    llm:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-706cf44145e64d96b9f53fcb4db86f9f
      model: qwen-plus                      # 可选: qwen-turbo / qwen-plus / qwen-max
      embedding-model: text-embedding-v3   # 输出维度 1024，与 Milvus 一致
      timeout: 60                           # 超时时间 (秒)

    # 文档处理配置
    document:
      # 支持的文件类型
      supported-formats: pdf,docx,doc,txt
      # 分块配置
      chunk:
        size: 500
        overlap: 50
        # 分块策略: fixed(固定大小), semantic(语义分割)
        strategy: semantic
      # 文本提取配置
      extraction:
        pdf:
          strategy: pdfbox
          extract-images: false
        docx:
          strategy: poi

    # 缓存配置
    cache:
      # 查询结果缓存
      query:
        enabled: true
        ttl: 3600  # 1小时
        max-size: 1000
      # 嵌入向量缓存
      embedding:
        enabled: true
        ttl: 86400  # 24小时
        max-size: 10000
      # LLM响应缓存
      llm:
        enabled: true
        ttl: 1800  # 30分钟
        max-size: 500

    # 性能监控配置
    monitoring:
      enabled: true
      # 指标采集间隔 (秒)
      interval: 60
      # 慢查询阈值 (毫秒)
      slow-query-threshold: 5000
      # 错误率阈值 (%)
      error-rate-threshold: 5.0

  # 安全配置
  security:
    jwt:
      secret: imkqas-medical-rag-secret-key-2026
      expiration: 86400000  # 24小时

    # 限流配置
    rate-limit:
      user:
        default: 10  # 10请求/秒
        burst: 20    # 突发容量
      admin:
        default: 50  # 50请求/秒
        burst: 100   # 突发容量
      upload: 2      # 文档上传接口限制

  # 文件存储配置
  storage:
    type: minio
    minio:
      endpoint: http://8.138.40.200:9000
      access-key: IVL8IthgH8OjCEDLhFKT
      secret-key: MaJEjDYQYSKfWVadxSPM2knEIKkVrXLgWvvxB8M8
      bucket: medical-documents

  # 向量数据库配置
  vector-db:
    type: milvus
    milvus:
      host: 8.138.40.200
      port: 19530
      collection: medical_documents
      dimension: 1024

  # 科室导诊服务配置
  triage:
    # 知识库配置路径
    knowledge-base-path: config/department-knowledge.yml
    synonyms-path: config/symptom-synonyms.yml

    # 缓存配置
    enable-cache: true
    cache-ttl: 3600  # 1小时

    # 引擎配置
    rule-engine-threshold: 0.8  # 规则引擎匹配阈值，80%症状通过规则引擎处理
    llm-fallback-timeout: 3000  # LLM降级分析超时时间（毫秒）

    # 性能配置
    max-batch-size: 20  # 批量处理最大数量
    emergency-check-enabled: true  # 是否启用急诊检查

    # 统计配置
    enable-stats: true  # 是否启用统计
    stats-log-interval: 300  # 统计日志输出间隔（秒）