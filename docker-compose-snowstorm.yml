version: '3.8'

# Snowstorm Lite 单节点部署
# 用于提供 SNOMED CT FHIR API 服务
# 使用轻量级版本，适合开发测试环境

services:
  snowstorm:
    image: SNOMEDInternational/snowstorm-lite:5.2.4
    container_name: imkqas-snowstorm
    ports:
      - "8082:8082"
    environment:
      # Java堆内存配置（根据需要调整）
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:+UseG1GC"
      # Spring配置
      SPRING_PROFILES_ACTIVE: "impatient"
      # 使用内存模式（轻量级）
      spring.r2dbc.url: r2dbc:pool:mem://snowstorm
      # 启用FHIR API
      spring.fhir.enabled: true
      spring.fhir.base-path: /fhir
      # 允许跨域（如果前端需要直接访问）
      spring.cors.allowed-origins: "*"
      # 提前加载常用版本（优化首次查询性能）
      snowstorm.initial_load_version: "v20240131"
    volumes:
      # 持久化索引数据（可选，首次启动后注释掉以加快启动）
      # - snowstorm_data:/data
      # 预加载的RF2包（可选）
      # - ./rf2:/rf2:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - imkqas-network

